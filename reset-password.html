<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>重置密码</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <h1>重置所有用户密码为与用户名相同</h1>
    <div id="output" style="font-family: monospace; white-space: pre-wrap;"></div>

    <script>
        const output = document.getElementById('output');
        function log(msg) {
            output.textContent += msg + '\n';
            console.log(msg);
        }

        const firebaseConfig = {
            projectId: "snake-game-6e39e",
            databaseURL: "https://snake-game-6e39e-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(16);
        }

        async function resetPasswords() {
            // 用户列表
            const users = ['1111', '2222', '3333', 'james', 'henry', 'becky', 'xuemei', 'gastation', 'acientemple'];

            for (const username of users) {
                const newPassword = simpleHash(username);
                await database.ref('users/' + username + '/password').set(newPassword);
                log(username + ' 密码设为: ' + username + ' (哈希: ' + newPassword + ')');
            }

            log('\n✅ 所有用户密码已重置!');
        }

        resetPasswords();
    </script>
</body>
</html>
