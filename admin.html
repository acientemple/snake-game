<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏 - 管理员</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .admin-login-container {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            margin: 100px auto;
        }
        .admin-login-container.active { display: block; }
        .admin-login-container h1 { text-align: center; color: #667eea; margin-bottom: 30px; }
        .admin-login-container input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;
        }
        .admin-login-container button {
            width: 100%; padding: 12px; background: #667eea;
            color: white; border: none; border-radius: 5px;
            cursor: pointer; margin-top: 20px; font-size: 16px;
        }
        .admin-login-container button:hover { background: #5568d3; }
        .hint { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
        .error { color: red; text-align: center; margin-top: 10px; }
        .success { color: green; text-align: center; margin-top: 10px; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; }
        .admin-container { display: none; max-width: 1200px; margin: 0 auto; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .admin-container.active { display: block; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #667eea; padding-bottom: 15px; margin-bottom: 20px; }
        .admin-header h1 { color: #667eea; margin: 0; }
        .logout-btn { padding: 8px 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .admin-section { background: #f8f9fa; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .admin-section h2 { color: #333; margin-top: 0; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .btn { padding: 8px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .btn:hover { background: #5568d3; }
        .btn-success { background: #2ecc71; }
        .btn-success:hover { background: #27ae60; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-sm { padding: 4px 10px; font-size: 12px; margin-right: 5px; }
        .user-list, .record-list { max-height: 400px; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 5px; margin-top: 10px; }
        .user-item, .record-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .status-bar { background: #e8f5e9; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .loading { color: #666; font-style: italic; text-align: center; padding: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal.active { display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; max-width: 400px; width: 90%; }
        .modal-content h3 { margin-top: 0; color: #667eea; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <!-- 登录表单 -->
    <div class="admin-login-container active" id="login-form">
        <h1>🐍 管理员登录</h1>
        <div id="auto-token-status" class="loading">正在自动获取 GitHub 权限...</div>
        <input type="text" id="admin-username" placeholder="管理员用户名" style="display:none;">
        <input type="password" id="admin-password" placeholder="管理员密码" style="display:none;">
        <input type="text" id="github-token" placeholder="GitHub Token (可选)" style="display:none;">
        <button id="admin-login-btn" style="display:none;">登录</button>
        <p id="login-error" class="error"></p>
        <div class="back-link"><a href="index.html">返回主页</a></div>
        <p class="hint">默认管理员: acientemple / 123456</p>
    </div>

    <!-- 管理面板 -->
    <div class="admin-container" id="admin-panel">
        <div class="admin-header">
            <h1>🐍 管理员面板</h1>
            <button class="logout-btn" id="logout-btn">退出登录</button>
        </div>

        <!-- GitHub 状态 -->
        <div class="status-bar">
            <span id="token-status">等待加载...</span>
            <div>
                <button class="btn" id="sync-btn">从 GitHub 同步</button>
                <button class="btn btn-success" id="save-to-github-btn">保存到 GitHub</button>
            </div>
        </div>

        <!-- 用户管理 -->
        <div class="admin-section">
            <h2>👥 用户列表</h2>
            <button class="btn" id="refresh-users-btn">刷新用户</button>
            <div class="user-list" id="user-list"></div>
        </div>

        <!-- 游戏记录 -->
        <div class="admin-section">
            <h2>📊 游戏记录</h2>
            <button class="btn" id="refresh-records-btn">刷新记录</button>
            <button class="btn btn-danger" id="clear-records-btn">清空记录</button>
            <div class="record-list" id="record-list"></div>
        </div>

        <!-- 数据管理 -->
        <div class="admin-section">
            <h2>💾 数据管理</h2>
            <button class="btn" id="export-btn">导出数据</button>
            <button class="btn btn-success" id="import-btn">导入数据</button>
            <input type="file" id="import-file" style="display:none;" accept=".json">
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal" id="password-modal">
        <div class="modal-content">
            <h3>修改密码</h3>
            <input type="hidden" id="edit-user-name">
            <input type="password" id="new-password" placeholder="新密码">
            <input type="password" id="confirm-password" placeholder="确认新密码">
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('password-modal')">取消</button>
                <button class="btn btn-success" id="save-password-btn">保存</button>
            </div>
        </div>
    </div>

    <script src="snake.js?v=20240308"></script>
    <script>
        // 简单的哈希函数
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(16);
        }

        // 确保管理员账号存在
        function ensureAdminExists() {
            let users = JSON.parse(localStorage.getItem('snake-users') || '{}');
            const adminUsername = 'acientemple';
            const adminPassword = '123456';

            if (!users[adminUsername]) {
                console.log('创建默认管理员账号');
                users[adminUsername] = {
                    password: simpleHash(adminPassword),
                    email: '',
                    created: new Date().toISOString(),
                    data: { isAdmin: true },
                    isAdmin: true
                };
                localStorage.setItem('snake-users', JSON.stringify(users));
            } else {
                users[adminUsername].isAdmin = true;
                users[adminUsername].data = users[adminUsername].data || {};
                users[adminUsername].data.isAdmin = true;
                localStorage.setItem('snake-users', JSON.stringify(users));
            }
        }

        // 自动获取 GitHub Token
        async function autoGetGitHubToken(existingToken = null) {
            // 如果传入了 Token，优先使用
            let token = existingToken || localStorage.getItem('snake-github-token') || localStorage.getItem('snake-shared-github-token');
            let user = localStorage.getItem('snake-shared-github-user');

            if (!token) {
                // 尝试用任意已有的 Token 查找 Gist
                const searchToken = localStorage.getItem('snake-github-token');
                if (searchToken) {
                    token = searchToken;
                }
            }

            // 如果有 Token，尝试获取 Gist 信息
            if (token) {
                try {
                    // 先尝试获取用户信息
                    const userResponse = await fetch('https://api.github.com/user', {
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });

                    if (userResponse.ok) {
                        const userData = await userResponse.json();
                        user = userData.login;
                        localStorage.setItem('snake-shared-github-user', user);
                        localStorage.setItem('snake-github-token', token);
                        localStorage.setItem('snake-shared-github-token', token);
                    }

                    // 查找 Gist
                    const listResponse = await fetch('https://api.github.com/gists', {
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });

                    if (listResponse.ok) {
                        const gists = await listResponse.json();
                        const existingGist = gists.find(g => g.description === 'Snake Game Users Data');

                        if (existingGist) {
                            localStorage.setItem('snake-users-gist-id', existingGist.id);
                            console.log('找到 Gist:', existingGist.id);

                            // 获取 Gist 内容
                            const gistResponse = await fetch(`https://api.github.com/gists/${existingGist.id}`, {
                                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                            });

                            if (gistResponse.ok) {
                                const gist = await gistResponse.json();
                                const configContent = gist.files['snake-config.json']?.content;
                                const usersContent = gist.files['snake-users.json']?.content;
                                const recordsContent = gist.files['snake-records.json']?.content;

                                console.log('Gist 文件:', Object.keys(gist.files));

                                // 读取用户数据
                                if (usersContent) {
                                    const cloudUsers = JSON.parse(usersContent);
                                    console.log('从 GitHub 加载用户数:', Object.keys(cloudUsers).length);
                                    localStorage.setItem('snake-users', usersContent);
                                }

                                // 读取记录数据
                                if (recordsContent) {
                                    const cloudRecords = JSON.parse(recordsContent);
                                    console.log('从 GitHub 加载记录数:', cloudRecords.length);
                                    localStorage.setItem('snake-records', recordsContent);
                                }

                                // 保存 Token 配置
                                if (configContent) {
                                    const config = JSON.parse(configContent);
                                    if (config.sharedToken) {
                                        localStorage.setItem('snake-shared-github-token', config.sharedToken);
                                    }
                                }

                                return { token, user, loaded: true };
                            }
                        } else {
                            console.log('未找到 Snake Game Gist');
                        }
                    }
                } catch (e) {
                    console.error('获取 Token 或 Gist 失败:', e);
                }
            }

            return { token, user, loaded: false };
        }

        // 从 GitHub 加载数据
        async function loadFromGitHub(token) {
            try {
                let gistId = localStorage.getItem('snake-users-gist-id');

                if (!gistId) {
                    const listResponse = await fetch('https://api.github.com/gists', {
                        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });

                    if (listResponse.ok) {
                        const gists = await listResponse.json();
                        const existingGist = gists.find(g => g.description === 'Snake Game Users Data');
                        if (existingGist) {
                            gistId = existingGist.id;
                            localStorage.setItem('snake-users-gist-id', gistId);
                        }
                    }
                }

                if (!gistId) return { config: null, users: null, records: null };

                const gistResponse = await fetch(`https://api.github.com/gists/${gistId}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });

                if (gistResponse.ok) {
                    const gist = await gistResponse.json();
                    return {
                        config: gist.files['snake-config.json'] ? JSON.parse(gist.files['snake-config.json'].content) : null,
                        users: gist.files['snake-users.json'] ? JSON.parse(gist.files['snake-users.json'].content) : {},
                        records: gist.files['snake-records.json'] ? JSON.parse(gist.files['snake-records.json'].content) : []
                    };
                }
            } catch (e) { console.error('加载失败:', e); }
            return { config: null, users: null, records: null };
        }

        // 保存到 GitHub
        async function saveToGitHub(token) {
            try {
                let gistId = localStorage.getItem('snake-users-gist-id');
                const users = JSON.parse(localStorage.getItem('snake-users') || '{}');
                const records = JSON.parse(localStorage.getItem('snake-records') || '[]');
                const topRecords = JSON.parse(localStorage.getItem('snake-top-records') || '[]');

                const gistData = {
                    description: 'Snake Game Users Data',
                    public: false,
                    files: {
                        'snake-users.json': { content: JSON.stringify(users, null, 2) },
                        'snake-records.json': { content: JSON.stringify(records, null, 2) },
                        'snake-top-records.json': { content: JSON.stringify(topRecords, null, 2) },
                        'snake-config.json': { content: JSON.stringify({ sharedToken: token, sharedUser: localStorage.getItem('snake-shared-github-user') }) }
                    }
                };

                let url = 'https://api.github.com/gists';
                let method = 'POST';

                if (gistId) {
                    url += `/${gistId}`;
                    method = 'PATCH';
                }

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(gistData)
                });

                if (response.ok) {
                    const gist = await response.json();
                    localStorage.setItem('snake-users-gist-id', gist.id);
                    return true;
                }
            } catch (e) { console.error('保存失败:', e); }
            return false;
        }

        function showLoginForm() {
            document.getElementById('auto-token-status').style.display = 'none';
            document.getElementById('admin-username').style.display = 'block';
            document.getElementById('admin-password').style.display = 'block';
            document.getElementById('github-token').style.display = 'block';
            document.getElementById('admin-login-btn').style.display = 'block';
        }

        // 关闭弹窗
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // 全局函数供 HTML 调用
        window.closeModal = closeModal;

        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');

        ensureAdminExists();

        if (page === 'manage') {
            document.getElementById('login-form').classList.remove('active');
            document.getElementById('admin-panel').classList.add('active');

            const currentUser = localStorage.getItem('snake-current-user');
            const isAdmin = localStorage.getItem('snake-admin') === 'true';

            if (!currentUser || !isAdmin) {
                window.location.href = 'admin.html';
            } else {
                initAdminPanel();
            }
        } else {
            document.getElementById('login-form').classList.add('active');

            const currentUser = localStorage.getItem('snake-current-user');
            const isAdmin = localStorage.getItem('snake-admin') === 'true';

            if (currentUser && isAdmin) {
                window.location.href = 'admin.html?page=manage';
            }

            autoGetGitHubToken().then(result => {
                if (result.token) {
                    document.getElementById('auto-token-status').textContent = '✓ 已自动获取 GitHub 权限';
                    document.getElementById('auto-token-status').className = 'success';
                } else {
                    document.getElementById('auto-token-status').textContent = '⚠ 请输入 GitHub Token';
                    document.getElementById('auto-token-status').className = 'error';
                }
                showLoginForm();
            }).catch(() => {
                showLoginForm('无法自动获取 GitHub 权限，请手动输入');
            });

            document.getElementById('admin-login-btn').addEventListener('click', async function() {
                const username = document.getElementById('admin-username').value.trim();
                const password = document.getElementById('admin-password').value;
                const token = document.getElementById('github-token').value.trim();
                const errorEl = document.getElementById('login-error');
                const btn = this;

                if (!username || !password) {
                    errorEl.textContent = '请输入用户名和密码';
                    return;
                }

                // 先验证管理员账号
                const users = JSON.parse(localStorage.getItem('snake-users') || '{}');
                const user = users[username];

                if (!user) { errorEl.textContent = '管理员账号不存在'; return; }
                if (user.password !== simpleHash(password)) { errorEl.textContent = '密码错误'; return; }
                const userIsAdmin = user.isAdmin || (user.data && user.data.isAdmin);
                if (!userIsAdmin) { errorEl.textContent = '您不是管理员'; return; }

                // 如果提供了 Token，先用这个 Token 加载数据
                if (token) {
                    btn.textContent = '登录并同步中...';
                    btn.disabled = true;

                    localStorage.setItem('snake-github-token', token);

                    // 使用提供的 Token 加载数据
                    const result = await autoGetGitHubToken(token);
                    console.log('登录时加载结果:', result);

                    if (result.loaded) {
                        errorEl.textContent = '✓ 登录成功，已从 GitHub 同步数据！';
                        errorEl.className = 'success';
                    } else {
                        // Token 可能无效，但继续登录
                        try {
                            const response = await fetch('https://api.github.com/user', {
                                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                            });
                            if (response.ok) {
                                const userData = await response.json();
                                localStorage.setItem('snake-shared-github-user', userData.login);
                                localStorage.setItem('snake-shared-github-token', token);
                            }
                        } catch(e) { console.log('Token验证失败', e); }
                    }
                }

                localStorage.setItem('snake-current-user', username);
                localStorage.setItem('snake-admin', 'true');

                setTimeout(() => {
                    window.location.href = 'admin.html?page=manage';
                }, 1000);
            });
        }

        async function initAdminPanel() {
            const tokenStatusEl = document.getElementById('token-status');
            const savedToken = localStorage.getItem('snake-github-token') || localStorage.getItem('snake-shared-github-token');
            const savedUser = localStorage.getItem('snake-shared-github-user');

            if (savedToken && savedUser) {
                tokenStatusEl.textContent = `✓ 已连接 GitHub，用户: ${savedUser}`;
                tokenStatusEl.className = 'success';
            } else {
                tokenStatusEl.textContent = '⚠ 未连接 GitHub';
                tokenStatusEl.className = 'error';
            }

            // 加载用户列表
            function loadUsers() {
                const users = JSON.parse(localStorage.getItem('snake-users') || '{}');
                const userList = document.getElementById('user-list');
                userList.innerHTML = '';

                const userCount = Object.keys(users).length;
                if (userCount === 0) {
                    userList.innerHTML = '<p style="padding:10px;color:#666;">暂无用户数据</p>';
                    return;
                }

                Object.keys(users).forEach(username => {
                    const user = users[username];
                    const isAdminUser = user.isAdmin || (user.data && user.data.isAdmin);
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <span>
                            <strong>${username}</strong>
                            ${isAdminUser ? ' <span style="color:red;">[管理员]</span>' : ''}
                            <br><small>注册时间: ${user.created || '未知'}</small>
                        </span>
                        <div>
                            <button class="btn btn-sm btn-success" onclick="openPasswordModal('${username}')">改密码</button>
                            ${!isAdminUser ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${username}')">删除</button>` : ''}
                        </div>
                    `;
                    userList.appendChild(div);
                });
            }

            // 加载游戏记录
            function loadRecords() {
                const records = JSON.parse(localStorage.getItem('snake-records') || '[]');
                const recordList = document.getElementById('record-list');
                recordList.innerHTML = '';

                if (records.length === 0) {
                    recordList.innerHTML = '<p style="padding:10px;color:#666;">暂无游戏记录</p>';
                    return;
                }

                records.sort((a, b) => b.score - a.score);

                records.slice(0, 50).forEach((record, index) => {
                    const div = document.createElement('div');
                    div.className = 'record-item';
                    div.innerHTML = `
                        <span>
                            <strong>${record.username || record.playerName}</strong>
                            - 分数: ${record.score}
                            - 模式: ${record.mode}
                            - 时间: ${record.date}
                        </span>
                        <button class="btn btn-sm btn-danger" onclick="deleteRecord(${index})">删除</button>
                    `;
                    recordList.appendChild(div);
                });
            }

            // 删除用户
            window.deleteUser = function(username) {
                if (!confirm(`确定要删除用户 "${username}" 吗？`)) return;
                const users = JSON.parse(localStorage.getItem('snake-users') || '{}');
                delete users[username];
                localStorage.setItem('snake-users', JSON.stringify(users));
                loadUsers();
                alert('用户已删除');
            };

            // 打开修改密码弹窗
            window.openPasswordModal = function(username) {
                document.getElementById('edit-user-name').value = username;
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
                document.getElementById('password-modal').classList.add('active');
            };

            // 保存密码
            document.getElementById('save-password-btn').addEventListener('click', function() {
                const username = document.getElementById('edit-user-name').value;
                const newPass = document.getElementById('new-password').value;
                const confirmPass = document.getElementById('confirm-password').value;

                if (!newPass || newPass.length < 3) {
                    alert('密码至少3位'); return;
                }
                if (newPass !== confirmPass) {
                    alert('两次密码不一致'); return;
                }

                const users = JSON.parse(localStorage.getItem('snake-users') || '{}');
                if (users[username]) {
                    users[username].password = simpleHash(newPass);
                    localStorage.setItem('snake-users', JSON.stringify(users));
                    closeModal('password-modal');
                    alert('密码已修改');
                }
            });

            // 删除记录
            window.deleteRecord = function(index) {
                if (!confirm('确定要删除这条记录吗？')) return;
                const records = JSON.parse(localStorage.getItem('snake-records') || '[]');
                records.sort((a, b) => b.score - a.score);
                records.splice(index, 1);
                localStorage.setItem('snake-records', JSON.stringify(records));
                loadRecords();
            };

            // 从 GitHub 同步
            document.getElementById('sync-btn').addEventListener('click', async function() {
                const token = localStorage.getItem('snake-github-token') || localStorage.getItem('snake-shared-github-token');
                if (!token) { alert('无法获取 GitHub 权限'); return; }

                const btn = this;
                btn.textContent = '同步中...';
                btn.disabled = true;

                const data = await loadFromGitHub(token);
                if (data.users) { localStorage.setItem('snake-users', JSON.stringify(data.users)); loadUsers(); }
                if (data.records) { localStorage.setItem('snake-records', JSON.stringify(data.records)); loadRecords(); }

                btn.textContent = '从 GitHub 同步';
                btn.disabled = false;
                alert('同步完成！');
            });

            // 保存到 GitHub
            document.getElementById('save-to-github-btn').addEventListener('click', async function() {
                const token = localStorage.getItem('snake-github-token') || localStorage.getItem('snake-shared-github-token');
                if (!token) { alert('无法获取 GitHub 权限'); return; }

                const btn = this;
                btn.textContent = '保存中...';
                btn.disabled = true;

                const success = await saveToGitHub(token);

                btn.textContent = '保存到 GitHub';
                btn.disabled = false;
                alert(success ? '保存成功！' : '保存失败');
            });

            // 清空记录
            document.getElementById('clear-records-btn').addEventListener('click', function() {
                if (!confirm('确定要清空所有游戏记录吗？此操作不可恢复！')) return;
                localStorage.setItem('snake-records', '[]');
                loadRecords();
                alert('记录已清空');
            });

            // 导出数据
            document.getElementById('export-btn').addEventListener('click', function() {
                const data = {
                    users: localStorage.getItem('snake-users'),
                    records: localStorage.getItem('snake-records'),
                    topRecords: localStorage.getItem('snake-top-records'),
                    exportTime: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'snake-game-backup.json';
                a.click();
                URL.revokeObjectURL(url);
            });

            // 导入数据
            document.getElementById('import-btn').addEventListener('click', function() {
                document.getElementById('import-file').click();
            });

            document.getElementById('import-file').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.users) localStorage.setItem('snake-users', data.users);
                        if (data.records) localStorage.setItem('snake-records', data.records);
                        if (data.topRecords) localStorage.setItem('snake-top-records', data.topRecords);
                        loadUsers();
                        loadRecords();
                        alert('导入成功！');
                    } catch(err) {
                        alert('导入失败：文件格式错误');
                    }
                };
                reader.readAsText(file);
            });

            // 退出登录
            document.getElementById('logout-btn').addEventListener('click', function() {
                localStorage.removeItem('snake-current-user');
                localStorage.removeItem('snake-admin');
                window.location.href = 'admin.html';
            });

            document.getElementById('refresh-users-btn').addEventListener('click', loadUsers);
            document.getElementById('refresh-records-btn').addEventListener('click', loadRecords);

            // 自动从 GitHub 同步
            const token = localStorage.getItem('snake-github-token') || localStorage.getItem('snake-shared-github-token');
            if (token) {
                const data = await loadFromGitHub(token);
                if (data.users) localStorage.setItem('snake-users', JSON.stringify(data.users));
                if (data.records) localStorage.setItem('snake-records', JSON.stringify(data.records));
            }

            loadUsers();
            loadRecords();
        }
    </script>
</body>
</html>
